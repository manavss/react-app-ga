name: Build React App

description: Setup Node.js, install dependencies, and build the project

inputs:
  node-version:
    description: Node.js version
    required: true

runs:
  using: composite

  steps:
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install Dependencies
      run: npm ci
      shell: bash

    - name: Build Project
      run: npm run build --if-present
      shell: bash
